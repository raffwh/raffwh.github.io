lang: en-USlang: en-US
title: Your Name - Photography & Data Science
description: Personal blog and portfolio
baseurl: ""
url: "https://raffwh.github.io"

author:
  name: Your Name
  picture: /assets/images/avatar.jpg

# Theme
remote_theme: mmistakes/jekyll-theme-basically-basic@1.4.5

# Build settings
markdown: kramdown
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 10
paginate_path: /page:num/

# Features to disable
search: false

# Exclude unnecessary files
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/

# Front Matter Defaults
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      read_time: true
      
      
google_fonts:
  - name: "Atkinson Hyperlegible Mono"
    weights: "400,400i,700,700i"
  - name: "Roboto Mono"  # for code/monospace
    weights: "400,700"
  - name: "Atkinson Hyperlegible Next"
    weights: "400,400i,700,700i"
    
    
    
include: ["_pages"]

defaults:
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page
      permalink: /:basename/